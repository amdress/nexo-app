# .github/workflows/ci.yml
name: NEXO-APP - Continuous Integration

on:
  push:
    branches: [ main, dev ]
  pull_request:
    branches: [ main, dev ]

jobs:
  validate:
    name: Build & Type-Check
    runs-on: ubuntu-latest

    steps:
      # 1. Faz o checkout do código do repositório
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. Configura o ambiente Node.js
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      # 3. Instala as dependências de forma limpa
      - name: Install dependencies
        run: npm install --legacy-peer-deps

      # 4. Executa a validação de tipos do TypeScript
      - name: TypeScript Type-Check
        run: npx tsc --noEmit

      # 5. Executa todos os testes automatizados com Jest (Agregado ✅)
      - name: Run Jest Tests
        run: npm run test -- --passWithNoTests