# .github/workflows/ci.yml
name: NEXO-APP - Continuous Integration

on:
  push:
    branches: [ main, dev ]
  pull_request:
    branches: [ main, dev ]

jobs:
  validate:
    name: Build & Type-Check
    runs-on: ubuntu-latest

    steps:
      # 1. Faz o checkout do código do repositório para a máquina virtual
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. Configura o ambiente Node.js na máquina virtual
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20' # Versão estável do Node
          cache: 'npm'    # Ativa cache automático para acelerar instalações futuras

      # 3. Instala as dependências do projeto de forma limpa
      - name: Install dependencies
        run: npm ci

      # 4. Executa a validação de tipos do TypeScript
      # Usamos --noEmit para compilar e validar os tipos sem gerar os arquivos .js físicos
      - name: TypeScript Type-Check
        run: npx tsc --noEmit